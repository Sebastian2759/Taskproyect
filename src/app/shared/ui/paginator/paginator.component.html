<div class="row paginator">
  <div class="muted">Total: {{ totalCount }}</div>

  <div class="row">
    <button class="btn btn-ghost" (click)="prev()" [disabled]="pageNumber <= 1">Prev</button>
    <div class="muted">{{ pageNumber }} / {{ totalPages }}</div>
    <button class="btn btn-ghost" (click)="next()" [disabled]="pageNumber >= totalPages">Next</button>
  </div>
</div>
